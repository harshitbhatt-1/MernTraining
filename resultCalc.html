<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Marks Calculator</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:420px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        .form-group{
            margin-bottom:15px;
        }

        label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        .result{
            margin-top:25px;
            padding:20px;
            background:#eef6ff;
            border-radius:8px;
            display:none;
        }

        .result p{
            margin:10px 0;
            font-size:18px;
        }

        .grade{
            font-weight:bold;
            color:green;
        }

    </style>
</head>
<body>

<div class="container">

    <h2>Student Marks Calculator</h2>

    <div class="form-group">
        <label>Subject 1</label>
        <input type="number" id="sub1" min="0" max="100">
    </div>

    <div class="form-group">
        <label>Subject 2</label>
        <input type="number" id="sub2" min="0" max="100">
    </div>

    <div class="form-group">
        <label>Subject 3</label>
        <input type="number" id="sub3" min="0" max="100">
    </div>

    <div class="form-group">
        <label>Subject 4</label>
        <input type="number" id="sub4" min="0" max="100">
    </div>

    <div class="form-group">
        <label>Subject 5</label>
        <input type="number" id="sub5" min="0" max="100">
    </div>

    <button onclick="calculateMarks()">Calculate Result</button>

    <div class="result" id="result">
        <p><strong>Total Marks :</strong> <span id="total"></span></p>
        <p><strong>Percentage :</strong> <span id="percentage"></span>%</p>
        <p><strong>Grade :</strong> <span id="grade" class="grade"></span></p>
    </div>

</div>

<script>

function calculateMarks(){

    let s1 = Number(document.getElementById("sub1").value);
    let s2 = Number(document.getElementById("sub2").value);
    let s3 = Number(document.getElementById("sub3").value);
    let s4 = Number(document.getElementById("sub4").value);
    let s5 = Number(document.getElementById("sub5").value);

    if(
        s1>100 || s2>100 || s3>100 ||
        s4>100 || s5>100 ||
        s1<0 || s2<0 || s3<0 ||
        s4<0 || s5<0 ||
        isNaN(s1) || isNaN(s2) || isNaN(s3) ||
        isNaN(s4) || isNaN(s5)
    ){
        alert("Please enter valid marks between 0 and 100.");
        return;
    }

    let total = s1+s2+s3+s4+s5;

    let percentage = total/5;

    let grade="";

    if(percentage>=90){
        grade="A+";
    }
    else if(percentage>=80){
        grade="A";
    }
    else if(percentage>=70){
        grade="B";
    }
    else if(percentage>=60){
        grade="C";
    }
    else{
        grade="Fail";
    }

    document.getElementById("total").textContent=total;
    document.getElementById("percentage").textContent=percentage.toFixed(2);
    document.getElementById("grade").textContent=grade;

    document.getElementById("result").style.display="block";

}

</script>

</body>
</html>
