 

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:bisque;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }

        .modal{
            width:100%;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:100%;
            max-width:650px;
            background:#fff;
            padding:35px;
            border-radius:12px;
            box-shadow:0 10px 30px rgba(0,0,0,.15);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            color:#0f172a;
        }

        form{
            display:flex;
            flex-direction:column;
            gap:18px;
        }

        .form-group{
            display:flex;
            flex-direction:column;
        }

        label{
            margin-bottom:8px;
            font-weight:bold;
            color:#374151;
        }

        input,
        select,
        textarea{
            padding:12px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:15px;
            outline:none;
        }

        input:focus,
        select:focus,
        textarea:focus{
            border-color:#2563eb;
        }

        textarea{
            resize:vertical;
        }

        .radio-group,
        .checkbox-group{
            display:flex;
            gap:20px;
            flex-wrap:wrap;
        }

        .radio-group label,
        .checkbox-group label{
            font-weight:normal;
            margin:0;
        }

        .buttons{
            display:flex;
            gap:15px;
            justify-content:center;
            margin-top:10px;
        }

        button{
            padding:12px 28px;
            border:none;
            border-radius:6px;
            font-size:16px;
            cursor:pointer;
            transition:.3s;
        }

        .submit-btn{
            background:#2563eb;
            color:#fff;
        }

        .submit-btn:hover{
            background:#1d4ed8;
        }

        .reset-btn{
            background:#ef4444;
            color:#fff;
        }

        .reset-btn:hover{
            background:#dc2626;
        }

        @media(max-width:600px){

            .container{
                padding:20px;
            }

            .radio-group,
            .checkbox-group{
                flex-direction:column;
                gap:10px;
            }

            .buttons{
                flex-direction:column;
            }
        }

    </style>

</head>
<body>

<main class="modal">

<section class="container">

<header>
<h2>Student Registration Form</h2>
</header>

<form>

<div class="form-group">
<label for="name">Student Name</label>
<input
type="text"
id="name"
name="name"
placeholder="Enter your name"
required
minlength="3"
maxlength="40">
</div>

<div class="form-group">
<label for="email">Email Address</label>
<input
type="email"
id="email"
name="email"
placeholder="example@gmail.com"
required>
</div>

<div class="form-group">
<label for="password">Password</label>
<input
type="password"
id="password"
name="password"
placeholder="Enter password"
required
minlength="8">
</div>

<div class="form-group">
<label>Gender</label>

<div class="radio-group">

<label>
<input
type="radio"
name="gender"
value="Male"
required>
 Male
</label>

<label>
<input
type="radio"
name="gender"
value="Female">
 Female
</label>

<label>
<input
type="radio"
name="gender"
value="Other">
 Other
</label>

</div>
</div>

<div class="form-group">

<label>Skills</label>

<div class="checkbox-group">

<label>
<input type="checkbox" name="skills">
 HTML
</label>

<label>
<input type="checkbox" name="skills">
 CSS
</label>

<label>
<input type="checkbox" name="skills">
 JavaScript
</label>

<label>
<input type="checkbox" name="skills">
 React
</label>

</div>

</div>

<div class="form-group">
<label for="city">City</label>

<select id="city" required>

<option value="">Select City</option>

<option>Bhopal</option>
<option>Delhi</option>
<option>Indore</option>
<option>Jaipur</option>
<option>Mumbai</option>

</select>

</div>

<div class="form-group">

<label for="address">Address</label>

<textarea
id="address"
rows="4"
placeholder="Enter your address"
required></textarea>

</div>

<div class="form-group">

<label for="photo">Profile Photo</label>

<input
type="file"
id="photo"
accept="image/*"
required>

</div>

<div class="buttons">

<button type="submit" class="submit-btn">
Submit
</button>

<button type="reset" class="reset-btn">
Reset
</button>

</div>

</form>

</section>

</main>

</body>
</html>
